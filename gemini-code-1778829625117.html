<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>MelodyRank — 음악 평가 & 랭킹</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" rel="stylesheet"/>
<style>
@font-face{font-family:'Freesentation';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2209@1.0/Freesentation-4Regular.woff2') format('woff2');font-weight:400;}
@font-face{font-family:'Freesentation';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2209@1.0/Freesentation-5Medium.woff2') format('woff2');font-weight:500;}
@font-face{font-family:'Freesentation';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2209@1.0/Freesentation-6SemiBold.woff2') format('woff2');font-weight:600;}
@font-face{font-family:'Freesentation';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2209@1.0/Freesentation-7Bold.woff2') format('woff2');font-weight:700;}

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#22223a;
  --border:#2a2a40;--border2:#3a3a55;
  --text:#f0f0f8;--text2:#b8b8d8;--text3:#7a7a9e;
  --amber:#f5a623;--amber2:#ffc857;--amber-dim:#3a2800;
  --red:#e05252;--red-dim:#3a1212;
  --gold-grad:linear-gradient(135deg,#f5a623,#ffd166);
  --radius:10px;--radius-lg:16px;
  --sans:'Freesentation',sans-serif;--serif:'Playfair Display',serif;--mono:'DM Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;z-index:0;}

header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1.25rem;}
.header-inner{max-width:960px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:baseline;gap:10px;}
.logo-name{font-family:var(--serif);font-size:22px;font-weight:600;
  background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.nav-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
  background:transparent;border:1px solid transparent;color:var(--text2);transition:all .15s;font-family:var(--sans);}
.nav-btn:hover{color:var(--text);border-color:var(--border2);}
.nav-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}

main{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 5rem;position:relative;z-index:1;}
.section{display:none;animation:fadeUp .2s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:1.5rem;}
.search-input-wrap{flex:1;position:relative;}
.search-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none;}
#search-input{width:100%;height:50px;padding:0 16px 0 44px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:var(--radius-lg);color:var(--text);
  font-family:var(--sans);font-size:15px;outline:none;transition:border-color .15s;}
#search-input:focus{border-color:var(--amber);}
#search-input::placeholder{color:var(--text3);font-size:13px;}
.btn-search{height:50px;padding:0 20px;border-radius:var(--radius-lg);border:none;
  background:var(--gold-grad);color:#1a0f00;font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:opacity .15s;}
.btn-search:hover{opacity:.88;}
.btn-search:disabled{opacity:.5;cursor:not-allowed;}

/* RESULTS */
.results-label{font-size:12px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
@media(max-width:700px){.results-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:440px){.results-grid{grid-template-columns:1fr;}}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.result-card.selected{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber);}
.thumb-wrap{position:relative;overflow:hidden;cursor:pointer;}
.thumb-wrap:hover .play-overlay{opacity:1;}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:#fff;gap:5px;pointer-events:none;}
.play-overlay i{font-size:32px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
.play-overlay span{font-size:12px;font-weight:600;}
.result-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3);}
.result-preview{display:none;aspect-ratio:16/9;background:var(--bg3);}
.result-preview.open{display:block;}
.result-preview iframe{width:100%;height:100%;border:none;}
.result-info{padding:10px;}
.result-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.result-channel{font-size:12px;color:var(--text2);}
.result-select-btn{width:100%;margin-top:9px;height:34px;border:none;border-radius:var(--radius);background:var(--gold-grad);color:#1a0f00;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.result-select-btn:hover{opacity:.85;}
.thumb-ph{aspect-ratio:16/9;display:none;align-items:center;justify-content:center;background:var(--bg3);color:var(--text3);flex-direction:column;gap:8px;}
.thumb-ph i{font-size:36px;opacity:.3;}
.thumb-ph span{font-size:11px;opacity:.55;}
.result-preview.open{display:block;position:relative;}
.prev-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg3);gap:12px;z-index:1;pointer-events:none;}
.prev-loading span{font-size:12px;color:var(--text3);}
.result-preview.open iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}

.search-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:16px;color:var(--text3);}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.search-loading span{font-size:14px;text-align:center;line-height:1.6;}
.search-error{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius);
  padding:12px 16px;font-size:13px;color:#f08080;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;line-height:1.6;}

.divider{display:flex;align-items:center;gap:12px;margin:0 0 1.25rem;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* RATE PANEL */
.rate-panel{display:none;}
.rate-panel.visible{display:block;animation:fadeUp .2s ease;}
.player-wrap{width:100%;aspect-ratio:16/9;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.25rem;}
.player-wrap iframe{width:100%;height:100%;border:none;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.card-title{font-size:12px;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:6px;font-weight:600;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field-row.single{grid-template-columns:1fr;}
.field-group label{display:block;font-size:12px;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;font-weight:500;}
input[type=text]{width:100%;height:44px;padding:0 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--border2);}
input[type=text]::placeholder{color:var(--text3);}

/* CRITERIA */
.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.criteria-grid{grid-template-columns:1fr;}}
.criterion{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.crit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.crit-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.crit-name i{font-size:15px;color:var(--amber);}
.crit-score{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--amber2);}
.crit-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 0 4px rgba(245,166,35,.12);}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;border:none;}

/* AVG BAR */
.avg-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.avg-left .label{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.avg-left .sub{font-size:12px;color:var(--text3);margin-top:3px;}
.avg-right{display:flex;align-items:center;gap:14px;}
.stars{display:flex;gap:3px;font-size:22px;}
.s-full{color:var(--amber);}.s-half{color:var(--amber);opacity:.5;}.s-empty{color:var(--border2);}
.avg-num-big{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--text);}
.avg-denom{font-size:13px;color:var(--text3);}

.btn-row{display:flex;gap:10px;}
.btn-primary{flex:1;height:48px;border:none;border-radius:var(--radius);font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;background:var(--gold-grad);color:#1a0f00;transition:opacity .15s;}
.btn-primary:hover{opacity:.88;}
.btn-secondary{height:48px;padding:0 20px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-secondary:hover{background:var(--bg3);color:var(--text);}

/* RANK */
.sort-bar{display:flex;gap:6px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
.sort-label{font-size:12px;color:var(--text3);margin-right:4px;font-weight:500;}
.sort-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text2);transition:all .15s;font-family:var(--sans);}
.sort-btn:hover{border-color:var(--border2);color:var(--text);}
.sort-btn.active{background:var(--amber-dim);color:var(--amber2);border-color:var(--amber);}
.rank-header{display:grid;grid-template-columns:40px 1fr 90px 90px 90px;gap:10px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.rh{font-size:11px;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;font-weight:600;}
.rank-row{display:grid;grid-template-columns:40px 1fr 90px 90px 90px;gap:10px;align-items:center;padding:14px;border-radius:var(--radius);cursor:pointer;transition:background .12s;border:1px solid transparent;}
.rank-row:hover{background:var(--bg2);}
.rank-row.active{background:var(--bg2);border-color:var(--border2);}
.rank-n{font-family:var(--mono);font-size:15px;color:var(--text3);text-align:center;}
.rank-n.gold{color:var(--amber2);font-weight:500;}.rank-n.silver{color:#c0c0d0;}.rank-n.bronze{color:#cd7f32;}
.rank-song{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-artist{font-size:13px;color:var(--text2);margin-top:2px;}
.genre-pill{display:inline-block;padding:3px 10px;border-radius:20px;background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:600;}
.rank-score-cell{text-align:center;}
.rank-score-n{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);}
.rank-score-d{font-size:11px;color:var(--text3);}
.rank-stars-cell{display:flex;gap:2px;justify-content:center;font-size:14px;}
.detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-top:.75rem;}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:1rem;}
.detail-title{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--text);}
.detail-artist{font-size:14px;color:var(--text2);margin-top:4px;}
.detail-score-big{font-family:var(--mono);font-size:32px;font-weight:500;background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.detail-yt{width:100%;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
.detail-yt iframe{width:100%;height:100%;border:none;}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.breakdown{grid-template-columns:1fr;}}
.bd-item{background:var(--bg3);border-radius:var(--radius);padding:12px;}
.bd-top{display:flex;justify-content:space-between;align-items:center;}
.bd-name{font-size:14px;color:var(--text2);font-weight:500;}
.bd-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--amber2);}
.bd-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:10px;}
.bd-bar{height:3px;border-radius:2px;background:var(--gold-grad);}
.empty{text-align:center;padding:4rem 1rem;}
.empty i{font-size:48px;margin-bottom:1rem;display:block;opacity:.4;color:var(--text3);}
.empty p{font-size:15px;line-height:1.8;color:var(--text2);}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:14px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:600px){
  header{padding:0 1rem;}
  .logo-sub{display:none;}
  .nav-btn{padding:6px 11px;font-size:12px;}
  main{padding:1rem 1rem 4rem;}
  #search-input{font-size:14px;height:46px;}
  #search-input::placeholder{font-size:12px;}
  .btn-search{height:46px;padding:0 14px;font-size:13px;}
  .btn-search .btn-label{display:none;}
  .field-row{grid-template-columns:1fr;}
  .card{padding:1rem;}
  input[type=text]{height:46px;font-size:15px;}
  .crit-name{font-size:15px;}
  .crit-score{font-size:22px;}
  input[type=range]::-webkit-slider-thumb{width:22px;height:22px;}
  .avg-num-big{font-size:26px;}
  .stars{font-size:20px;}
  .btn-primary{height:50px;font-size:15px;}
  .btn-secondary{height:50px;font-size:14px;}
  .sort-btn{padding:5px 11px;font-size:12px;}
  .rank-header,.rank-row{grid-template-columns:32px 1fr 68px 68px;}
  .rh:last-child,.rank-stars-cell{display:none;}
  .rank-song{font-size:14px;}
  .rank-artist{font-size:12px;}
  .detail-panel{padding:1.1rem;}
  .detail-title{font-size:18px;}
  .detail-score-big{font-size:28px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-name">🎵 MelodyRank</span>
      <span class="logo-sub">음악 평가 & 랭킹</span>
    </div>
    <nav style="display:flex;gap:4px;">
      <button class="nav-btn active" onclick="switchTab('rate')" id="nav-rate">🎚️ 평가하기</button>
      <button class="nav-btn" onclick="switchTab('rank')" id="nav-rank">🏆 랭킹</button>
    </nav>
  </div>
</header>

<main>

<div class="section active" id="section-rate">
  <div class="search-row">
    <div class="search-input-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="아티스트, 곡명으로 검색 (예: 아이유 밤편지, BTS Dynamite)…"
        onkeydown="if(event.key==='Enter')doSearch()"/>
    </div>
    <button class="btn-search" id="search-btn" onclick="doSearch()">
      <i class="ti ti-search"></i><span class="btn-label"> 검색</span>
    </button>
  </div>

  <div id="results-area"></div>
  <div class="divider" id="divider" style="display:none">또는 유튜브 링크 직접 입력</div>

  <div style="position:relative;margin-bottom:1.25rem;">
    <i class="ti ti-brand-youtube" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#ff4444;font-size:18px;pointer-events:none;"></i>
    <input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=…" style="padding-left:42px;" oninput="onUrlInput(this.value)"/>
  </div>

  <div class="rate-panel" id="rate-panel">
    <div class="player-wrap" id="yt-frame">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);">
        <i class="ti ti-player-play" style="font-size:48px;opacity:.3"></i>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-music"></i>곡 정보 확인 · 수정</div>
      <div class="field-row">
        <div class="field-group"><label>곡 제목</label><input type="text" id="song-title" placeholder="곡 제목"/></div>
        <div class="field-group"><label>아티스트</label><input type="text" id="song-artist" placeholder="아티스트명"/></div>
      </div>
      <div class="field-row single">
        <div class="field-group"><label>장르</label><input type="text" id="song-genre" placeholder="K-Pop, Rock, Jazz, R&B, 클래식, 힙합 …"/></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-adjustments-horizontal"></i>항목별 평가
        <span style="font-weight:400;font-size:11px;margin-left:4px;color:var(--text3)">(각 항목 0 ~ 10점, 소수점 2자리)</span>
      </div>
      <div class="criteria-grid" id="criteria-grid"></div>
    </div>

    <div class="avg-bar">
      <div class="avg-left">
        <div class="label">종합 평균</div>
        <div class="sub">5개 항목 평균</div>
      </div>
      <div class="avg-right">
        <div class="stars" id="avg-stars"></div>
        <div><span class="avg-num-big" id="avg-num">5.00</span><span class="avg-denom"> / 10</span></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="resetAll()">↩ 처음으로</button>
      <button class="btn-primary" onclick="submitRating()">✓ 평가 등록하기</button>
    </div>
  </div>
</div>

<div class="section" id="section-rank">
  <div class="sort-bar">
    <span class="sort-label">정렬</span>
    <button class="sort-btn active" onclick="setSort('avg')" id="sort-avg">종합점수</button>
    <button class="sort-btn" onclick="setSort('play')" id="sort-play">연주력</button>
    <button class="sort-btn" onclick="setSort('vocal')" id="sort-vocal">보컬</button>
    <button class="sort-btn" onclick="setSort('mood')" id="sort-mood">분위기</button>
    <button class="sort-btn" onclick="setSort('genre')" id="sort-genre">장르성</button>
    <button class="sort-btn" onclick="setSort('originality')" id="sort-originality">독창성</button>
  </div>
  <div class="rank-header">
    <div class="rh" style="text-align:center">#</div>
    <div class="rh">곡 / 아티스트</div>
    <div class="rh" style="text-align:center">장르</div>
    <div class="rh" style="text-align:center">점수</div>
    <div class="rh" style="text-align:center">별점</div>
  </div>
  <div id="rank-list"></div>
  <div id="rank-detail"></div>
</div>

</main>

<div class="toast" id="toast"></div>

<script>
const CRITERIA=[
  {key:'play',       name:'연주력',  desc:'악기·편곡·기술 완성도',  icon:'ti-guitar-pick'},
  {key:'vocal',      name:'보컬',    desc:'음정·감정·음색·발음',    icon:'ti-microphone'},
  {key:'mood',       name:'분위기',  desc:'감성·몰입감·무드 전달',  icon:'ti-wave-sine'},
  {key:'genre',      name:'장르성',  desc:'장르 정체성과 표현력',   icon:'ti-music'},
  {key:'originality',name:'독창성',  desc:'창의성·신선함·차별화',  icon:'ti-sparkles'},
];
let scores={play:5,vocal:5,mood:5,genre:5,originality:5};
let sortKey='avg';
let selectedRankId=null;

const loadRatings=()=>{try{return JSON.parse(localStorage.getItem('melodyrank')||'[]')}catch{return[]}};
const saveRatings=r=>localStorage.setItem('melodyrank',JSON.stringify(r));

/* SEARCH */
async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q){toast('⚠️ 검색어를 입력해 주세요.');return;}
  const area=document.getElementById('results-area');
  document.getElementById('divider').style.display='none';
  area.innerHTML=`<div class="search-loading"><div class="spinner"></div><span>유튜브에서 <strong>"${q}"</strong> 검색 중…</span></div>`;
  document.getElementById('search-btn').disabled=true;

  const body={
    model:'claude-sonnet-4-20250514',max_tokens:1000,
    system:'You are a YouTube search assistant. Always respond with ONLY valid JSON array, no markdown, no extra text.',
    tools:[{type:'web_search_20250305',name:'web_search'}],
    messages:[{role:'user',content:`Search YouTube for "${q}" and find 6 real music video results. Return ONLY a JSON array:\n[{"videoId":"11charID","title":"Song Title","artist":"Actual Artist Name","channel":"YT Channel"}]\nRules: videoId exactly 11 chars. artist = real performing artist name (not channel name like "MAGIC! - Topic", use "MAGIC!"). title = clean song title only.`}]
  };

  const doFetch=()=>fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });

  try{
    let res=await doFetch();

    // 과부하 시 최대 2회 재시도
    for(let i=1;i<=2&&(res.status===529||res.status===503||res.status===500);i++){
      area.innerHTML=`<div class="search-loading"><div class="spinner"></div><span>서버가 혼잡해요. 재시도 중… (${i}/2)</span></div>`;
      await new Promise(r=>setTimeout(r,2000*i));
      res=await doFetch();
    }

    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e?.error?.message||`오류가 발생했습니다 (${res.status}). 잠시 후 다시 시도해 주세요.`);
    }

    const data=await res.json();
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=raw.replace(/```json|```/g,'').trim().match(/\[[\s\S]*\]/);
    if(!m) throw new Error('검색 결과를 파싱하지 못했습니다. 다시 시도해 주세요.');
    const results=JSON.parse(m[0]);
    if(!Array.isArray(results)||!results.length) throw new Error('검색 결과가 없습니다. 다른 검색어를 시도해 보세요.');
    renderResults(results,q);
  }catch(err){
    area.innerHTML=`<div class="search-error"><i class="ti ti-alert-triangle"></i><span>${err.message||'알 수 없는 오류가 발생했습니다.'}</span></div>`;
  }finally{
    document.getElementById('search-btn').disabled=false;
  }
}

function cardGrad(s){
  let h=0;for(let c of s)h=Math.imul(31,h)+c.charCodeAt(0)|0;
  const hue=(h>>>0)%360;
  return`linear-gradient(135deg,hsl(${hue},45%,22%),hsl(${(hue+60)%360},55%,33%))`;
}
function renderResults(results,q){
  const area=document.getElementById('results-area');
  document.getElementById('divider').style.display='flex';
  area.innerHTML=`
    <div class="results-label">"${q}" 검색 결과 ${results.length}개 — 클릭하면 바로 재생</div>
    <div class="results-grid">
      ${results.map((r,i)=>`
        <div class="result-card" id="rc-${i}" onclick="selectResult(${i},'${e(r.videoId)}','${e(r.title)}','${e(r.artist||r.channel)}')">
          <div class="thumb-wrap" style="background:${cardGrad(r.title+(r.artist||r.channel))}">
            <img 
              src="https://img.youtube.com/vi/${r.videoId}/hqdefault.jpg" 
              style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border:none;pointer-events:none;" 
              alt="썸네일" loading="lazy" 
            />
            <div class="play-overlay"><i class="ti ti-player-play-filled"></i><span>바로 재생</span></div>
          </div>
          <div class="result-info">
            <div class="result-title">${r.title}</div>
            <div class="result-channel"><i class="ti ti-user" style="font-size:10px;vertical-align:-1px"></i> ${r.artist||r.channel}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function e(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function togglePreview(idx,videoId){
  const prev=document.getElementById('prev-'+idx);
  const isOpen=prev.classList.contains('open');
  document.querySelectorAll('.result-preview').forEach(p=>{p.classList.remove('active');p.innerHTML='';});
  if(!isOpen){
    prev.classList.add('open');
    // 로딩 오버레이 먼저 표시
    prev.innerHTML=`
      <div class="prev-loading" id="pld-${idx}">
        <div class="spinner"></div>
        <span>영상 불러오는 중…</span>
      </div>
      <iframe
        src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
        allowfullscreen
        onload="var l=document.getElementById('pld-${idx}');if(l)l.style.display='none';">
      </iframe>`;
    // 5초 후에도 로딩 중이면 자동 제거
    setTimeout(()=>{const l=document.getElementById('pld-'+idx);if(l)l.style.display='none';},5000);
  }
}

function selectResult(idx,videoId,title,artist){
  document.querySelectorAll('.result-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById('rc-'+idx);
  if(card) card.classList.add('selected');
  loadVideo(videoId,title,artist);
}

function extractId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}
let _urlT=null;
function onUrlInput(url){
  clearTimeout(_urlT);
  const id=extractId(url);
  if(id) _urlT=setTimeout(()=>loadVideo(id,'',''),400);
}
let _curVid=null;
function playVideo(vid){
  _curVid=vid;
  document.getElementById('yt-frame').innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&enablejsapi=1" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
}
function loadVideo(videoId,title,artist){
  _curVid=videoId;
  const frame=document.getElementById('yt-frame');
  const grad=cardGrad((title||videoId)+(artist||''));
  frame.innerHTML=`
    <div style="position:relative;width:100%;height:100%;cursor:pointer;background:${grad}" onclick="playVideo('${videoId}')">
      <img 
        src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" 
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border:none;pointer-events:none;" 
        alt="썸네일" 
      />
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
        <div style="width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.5);">
          <i class="ti ti-player-play-filled" style="font-size:28px;color:#1a0f00;margin-left:4px"></i>
        </div>
      </div>
    </div>`;
  document.getElementById('yt-url').value=`https://www.youtube.com/watch?v=${videoId}`;
  if(title) document.getElementById('song-title').value=title;
  if(artist) document.getElementById('song-artist').value=artist;
  document.getElementById('rate-panel').classList.add('visible');
  setTimeout(()=>document.getElementById('rate-panel').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function buildGrid(){
  document.getElementById('criteria-grid').innerHTML=CRITERIA.map(c=>`
    <div class="criterion">
      <div class="crit-head">
        <span class="crit-name"><i class="ti ${c.icon}"></i>${c.name}</span>
        <span class="crit-score" id="sc-${c.key}">${scores[c.key].toFixed(2)}</span>
      </div>
      <div class="crit-desc">${c.desc}</div>
      <input type="range" min="0" max="10" step="0.01" value="${scores[c.key]}"
        oninput="updateScore('${c.key}',parseFloat(this.value))"/>
    </div>`).join('');
}
function updateScore(k,v){scores[k]=v;document.getElementById('sc-'+k).textContent=v.toFixed(2);updateAvg();}
const calcAvg=()=>CRITERIA.reduce((s,c)=>s+scores[c.key],0)/CRITERIA.length;
function renderStars(avg10){
  const v=avg10/2;
  return[1,2,3,4,5].map(i=>v>=i?'<span class="s-full">★</span>':v>=i-.5?'<span class="s-half">★</span>':'<span class="s-empty">★</span>').join('');
}
function updateAvg(){const a=calcAvg();document.getElementById('avg-num').textContent=a.toFixed(2);document.getElementById('avg-stars').innerHTML=renderStars(a);}
function resetAll(){
  _curVid=null;
  scores={play:5,vocal:5,mood:5,genre:5,originality:5};
  ['yt-url','song-title','song-artist','song-genre'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('yt-frame').innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);"><i class="ti ti-player-play" style="font-size:48px;opacity:.3"></i></div>`;
  document.getElementById('rate-panel').classList.remove('visible');
  document.getElementById('results-area').innerHTML='';
  document.getElementById('divider').style.display='none';
  document.getElementById('search-input').value='';
  buildGrid();updateAvg();
window.addEventListener('message',e=>{
  if(e.origin!=='https://www.youtube.com')return;
  try{
    const d=JSON.parse(e.data);
    if(d.event==='onError'&&_curVid){
      const v=_curVid;
      document.getElementById('yt-frame').innerHTML=`
        <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg3);padding:1.5rem;text-align:center;">
          <i class="ti ti-player-play-filled" style="font-size:52px;opacity:.15;color:var(--text)"></i>
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">이 영상은 임베드 재생을 지원하지 않아요</div>
            <div style="font-size:13px;color:var(--text3);line-height:1.7">YouTube에서 직접 감상하신 후 아래에서 평가해 주세요</div>
          </div>
          <a href="https://www.youtube.com/watch?v=${v}" target="_blank" rel="noopener"
            style="display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--gold-grad);color:#1a0f00;border-radius:var(--radius);font-size:14px;font-weight:700;text-decoration:none;">
            <i class="ti ti-brand-youtube"></i> YouTube에서 보기
          </a>
        </div>`;
    }
  }catch(_){}
});window.scrollTo({top:0,behavior:'smooth'});
}
function submitRating(){
  const url=document.getElementById('yt-url').value.trim();
  const title=document.getElementById('song-title').value.trim();
  const artist=document.getElementById('song-artist').value.trim();
  const genre=document.getElementById('song-genre').value.trim();
  if(!url||!title||!artist){toast('⚠️ 유튜브 링크, 제목, 아티스트를 입력해 주세요.');return;}
  if(!extractId(url)){toast('⚠️ 올바른 유튜브 링크를 입력해 주세요.');return;}
  const ratings=loadRatings();
  ratings.push({id:Date.now(),url,title,artist,genre:genre||'기타',scores:{...scores},avg:calcAvg(),date:new Date().toLocaleDateString('ko-KR')});
  saveRatings(ratings);toast('✅ 평가가 등록되었습니다!');resetAll();switchTab('rank');
}

function setSort(k){
  sortKey=k;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort-'+k).classList.add('active');
  renderRank();
}
function renderRank(){
  const ratings=loadRatings();
  const list=document.getElementById('rank-list');
  if(!ratings.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-music-off"></i><p>아직 등록된 음악이 없습니다.<br>첫 번째 음악을 평가해 보세요!</p></div>`;
    document.getElementById('rank-detail').innerHTML='';return;
  }
  const sorted=[...ratings].sort((a,b)=>{
    const va=sortKey==='avg'?a.avg:a.scores[sortKey];
    const vb=sortKey==='avg'?b.avg:b.scores[sortKey];
    return vb-va;
  });
  const rc=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  list.innerHTML=sorted.map((r,i)=>`
    <div class="rank-row${selectedRankId===r.id?' active':''}" onclick="selectRow(${r.id})">
      <div class="rank-n ${rc(i)}">${i+1}</div>
      <div><div class="rank-song">${r.title}</div><div class="rank-artist">${r.artist}</div></div>
      <div style="text-align:center"><span class="genre-pill">${r.genre}</span></div>
      <div class="rank-score-cell"><div class="rank-score-n">${r.avg.toFixed(2)}</div><div class="rank-score-d">/ 10</div></div>
      <div class="rank-stars-cell">${renderStars(r.avg)}</div>
    </div>`).join('');
  if(selectedRankId){const f=ratings.find(r=>r.id===selectedRankId);if(f)renderDetail(f);}
}
function selectRow(id){
  if(selectedRankId===id){selectedRankId=null;document.getElementById('rank-detail').innerHTML='';renderRank();return;}
  selectedRankId=id;
  const r=loadRatings().find(r=>r.id===id);
  if(r){renderDetail(r);renderRank();}
}
function renderDetail(r){
  const vid=extractId(r.url);
  document.getElementById('rank-detail').innerHTML=`
    <div class="detail-panel">
      <div class="detail-head">
        <div>
          <div class="detail-title">${r.title}</div>
          <div class="detail-artist">${r.artist} · <span class="genre-pill">${r.genre}</span></div>
        </div>
        <div style="text-align:right">
          <div class="detail-score-big">${r.avg.toFixed(2)}</div>
          <div class="rank-stars-cell" style="justify-content:flex-end;margin-top:4px">${renderStars(r.avg)}</div>
        </div>
      </div>
      ${vid?`<div class="detail-yt"><iframe src="https://www.youtube-nocookie.com/embed/${vid}" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`:''}
      <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600">항목별 세부 점수</div>
      <div class="breakdown">
        ${CRITERIA.map(c=>`
          <div class="bd-item">
            <div class="bd-top">
              <div class="bd-name"><i class="ti ${c.icon}" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>${c.name}</div>
              <div class="bd-val">${r.scores[c.key].toFixed(2)}</div>
            </div>
            <div class="bd-bar-wrap"><div class="bd-bar" style="width:${r.scores[c.key]*10}%"></div></div>
          </div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:12px">등록일: ${r.date}</div>
    </div>`;
}

function switchTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+t).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+t).classList.add('active');
  if(t==='rank'){selectedRankId=null;renderRank();}
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

buildGrid();updateAvg();
</script>
</body>
</html>
